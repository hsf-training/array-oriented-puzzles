version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - '*'
    cooldown:
      default-days: 7

  - package-ecosystem: pip
    directory: /site
    schedule:
      interval: monthly
    groups:
      pip-dependencies:
        patterns:
          - '*'
    cooldown:
      default-days: 7